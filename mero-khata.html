<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#92400e">
<title>मेरो खाता</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#faf7f2;color:#1c1a17;
    max-width:430px;margin:0 auto;
    position:relative;height:100dvh;
    display:flex;flex-direction:column;
  }
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-thumb{background:#d97706;border-radius:2px}
  button,input,select,textarea{font-family:inherit;font-size:14px;}
  select option{background:#fffbf5;}
  input[type=number]::-webkit-inner-spin-button{opacity:.4}

  /* ── ANIMATIONS ── */
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes calPop{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .anim{animation:slideUp .22s ease both}

  /* ── HEADER ── */
  #header{
    background:linear-gradient(135deg,#92400e,#b45309,#d97706);
    padding:18px 16px 13px;
    box-shadow:0 4px 18px rgba(146,64,14,.3);
    flex-shrink:0;
  }
  #header .top{display:flex;justify-content:space-between;align-items:flex-start;}
  #header .label{font-size:10px;color:#fde68a;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
  #header .title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-top:1px;}
  #header .today{font-size:11px;color:#fcd34d;margin-top:2px;font-weight:600;}
  #header .baki-label{font-size:9px;color:#fde68a;font-weight:700;letter-spacing:.5px;text-align:right;}
  #header .baki-val{font-size:22px;font-weight:900;letter-spacing:-.5px;text-align:right;}
  .pills{display:flex;gap:7px;margin-top:10px;overflow-x:auto;padding-bottom:2px;}
  .pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:4px 11px;white-space:nowrap;}
  .pill .pl{font-size:9px;color:#fde68a;font-weight:700;}
  .pill .pv{font-size:12px;font-weight:800;}

  /* ── TABS ── */
  #tabs{
    display:flex;background:#fff;
    border-bottom:2px solid #fef3c7;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
    flex-shrink:0;
  }
  .tab-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:8px 0;cursor:pointer;
    border-bottom:3px solid transparent;transition:all .15s;
    background:none;border-left:none;border-right:none;border-top:none;
  }
  .tab-btn.active{border-bottom:3px solid #d97706;}
  .tab-btn .ti{font-size:17px;}
  .tab-btn .tl{font-size:9px;font-weight:700;color:#9ca3af;margin-top:1px;letter-spacing:.4px;text-transform:uppercase;}
  .tab-btn.active .tl{color:#d97706;}

  /* ── CONTENT ── */
  #content{flex:1;overflow-y:auto;padding:13px 13px 90px;}

  /* ── CARDS ── */
  .card{background:#fff;border:1px solid #fde68a;border-radius:14px;padding:14px;margin-bottom:10px;}
  .card:hover{background:#fef9ec;}
  .stat-row{display:flex;background:#fff;border-radius:11px;padding:11px;margin-bottom:11px;border:1px solid #fde68a;}
  .stat-cell{flex:1;text-align:center;}
  .stat-cell:not(:last-child){border-right:1px solid #fde68a;}
  .stat-cell .sl{font-size:8px;color:#9ca3af;font-weight:700;}
  .stat-cell .sv{font-size:13px;font-weight:900;margin-top:1px;}

  /* ── GRID CARDS ── */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
  .gcard{border-radius:13px;padding:11px 13px;}
  .gcard .gi{font-size:18px;margin-bottom:3px;}
  .gcard .gl{font-size:9px;color:#6b7280;font-weight:700;text-transform:uppercase;}
  .gcard .gv{font-size:16px;font-weight:900;margin-top:2px;}
  .gcard .gs{font-size:9px;color:#9ca3af;margin-top:1px;}

  /* ── BIG BAKI CARD ── */
  .big-baki{background:linear-gradient(135deg,#92400e,#d97706);border-radius:14px;padding:18px;margin-bottom:11px;color:#fff;}
  .big-baki .bb-l{font-size:9px;color:#fde68a;font-weight:700;letter-spacing:1px;}
  .big-baki .bb-v{font-size:34px;font-weight:900;letter-spacing:-.5px;margin-top:3px;}
  .big-baki .bb-s{font-size:11px;color:#fcd34d;margin-top:3px;}

  /* ── PATRO ── */
  .patro-header{background:linear-gradient(135deg,#7c2d12,#c2410c,#ea580c);border-radius:14px;padding:13px 15px;margin-bottom:12px;color:#fff;}
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:9px;font-size:18px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .month-title{font-size:20px;font-weight:900;text-align:center;}
  .month-sub{font-size:10px;color:#fed7aa;text-align:center;margin-top:1px;}
  .day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
  .dh{text-align:center;font-size:9px;font-weight:700;padding:3px 0;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px;}
  .cal-day{background:#fff;border:1px solid #fef3c7;border-radius:9px;padding:3px 1px 5px;text-align:center;min-height:40px;cursor:pointer;transition:all .12s;position:relative;}
  .cal-day:hover{background:#fef3c7;}
  .cal-day.today{background:#fff7ed;border:2px solid #f59e0b;}
  .cal-day.selected{background:#d97706;border:2px solid #d97706;}
  .cal-day.empty{opacity:0;pointer-events:none;}
  .cal-day .cn{font-size:12px;font-weight:400;line-height:1.2;}
  .cal-day.today .cn{color:#d97706;font-weight:800;}
  .cal-day.selected .cn{color:#fff;font-weight:800;}
  .cal-day .ca{font-size:7px;color:#bbb;}
  .cal-day.today .ca{color:#d97706;}
  .cal-day.selected .ca{color:rgba(255,255,255,.6);}
  .cal-day.sat .cn{color:#dc2626;}
  .cal-day.sun .cn{color:#b45309;}
  .dots{display:flex;justify-content:center;gap:2px;margin-top:1px;}
  .dot{width:4px;height:4px;border-radius:50%;}
  .cal-day.selected .dot{background:#fff!important;}
  .legend{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#6b7280;}
  .legend-dot{width:7px;height:7px;border-radius:50%;}
  .sel-day-panel{background:#fff;border:2px solid #fde68a;border-radius:12px;padding:13px;margin-bottom:10px;animation:slideUp .2s ease;}
  .event-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:5px;}
  .event-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .month-events{margin-top:2px;}
  .month-ev-item{display:flex;align-items:center;gap:10px;padding:7px 11px;background:#fff;border-radius:8px;margin-bottom:5px;}
  .mei-day{min-width:24px;text-align:center;}
  .mei-d{font-size:13px;font-weight:800;}
  .mei-w{font-size:8px;color:#9ca3af;}

  /* ── BS DATE PICKER ── */
  .bsdp{margin-bottom:14px;position:relative;}
  .bsdp label{font-size:11px;font-weight:700;color:#6b7280;display:block;margin-bottom:5px;}
  .bsdp-trigger{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 13px;border:1.5px solid #fde68a;border-radius:10px;
    background:#fff;cursor:pointer;transition:all .15s;
  }
  .bsdp-trigger.open{border-color:#d97706;background:#fffbf0;box-shadow:0 0 0 3px rgba(217,119,6,.2);}
  .bsdp-trigger .dt-icon{font-size:16px;margin-right:8px;}
  .bsdp-trigger .dt-main{font-size:14px;font-weight:700;color:#1c1a17;}
  .bsdp-trigger .dt-main.empty{font-weight:400;color:#9ca3af;}
  .bsdp-trigger .dt-sub{font-size:10px;color:#9ca3af;margin-top:1px;}
  .bsdp-trigger .dt-arrow{font-size:11px;font-weight:700;}
  .bsdp-trigger .dt-clear{font-size:16px;color:#9ca3af;padding:0 2px;background:none;border:none;cursor:pointer;line-height:1;}
  .bsdp-cal{
    position:absolute;top:100%;left:0;right:0;margin-top:4px;
    background:#fffbf5;border:2px solid var(--accent,#d97706);
    border-radius:14px;padding:12px;z-index:9999;
    box-shadow:0 8px 32px rgba(0,0,0,.18);
    animation:calPop .15s ease;
  }
  .bsdp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .bsdp-nav-btn{background:rgba(217,119,6,.15);border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .bsdp-nav select{background:none;border:none;font-size:13px;font-weight:800;cursor:pointer;outline:none;color:#1c1a17;}
  .bsdp-today-btn{display:block;margin:0 auto 7px;background:rgba(217,119,6,.12);border:1px solid rgba(217,119,6,.3);border-radius:20px;padding:3px 14px;font-size:10px;font-weight:700;cursor:pointer;}
  .bsdp-dh{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
  .bsdp-dhc{text-align:center;font-size:9px;font-weight:700;padding:2px 0;}
  .bsdp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .bsdp-cell{text-align:center;padding:5px 0;border-radius:7px;font-size:12px;cursor:pointer;border:1.5px solid transparent;transition:background .1s;}
  .bsdp-cell:hover{background:#fef3c7;}
  .bsdp-cell.sel{color:#fff;font-weight:800;}
  .bsdp-cell.tod{font-weight:800;}
  .bsdp-cell.empty{opacity:0;pointer-events:none;}
  .bsdp-cell.sat{color:#dc2626;}
  .bsdp-cell.sun{color:#b45309;}

  /* ── RENT / PASAL CARDS ── */
  .rec-card{background:#fff;border:1px solid #fde68a;border-radius:14px;padding:13px;margin-bottom:10px;transition:background .18s;}
  .rec-card:hover{background:#fef9ec;}
  .rec-main{display:flex;justify-content:space-between;align-items:flex-start;}
  .rec-left{flex:1;}
  .rec-right{text-align:right;margin-left:9px;}
  .rec-title{font-weight:800;font-size:14px;}
  .rec-bs{font-size:10px;color:#d97706;font-weight:700;}
  .rec-ad{font-size:10px;color:#9ca3af;}
  .rec-note{font-size:10px;color:#6b7280;margin-top:5px;background:#fef9ec;border-radius:6px;padding:3px 8px;}
  .rec-amount{font-size:17px;font-weight:900;}
  .rec-paid-label{font-size:10px;color:#16a34a;font-weight:700;}
  .rec-paid-ad{font-size:9px;color:#9ca3af;}
  .prog-wrap{background:#f3f4f6;border-radius:5px;height:5px;margin:7px 0;overflow:hidden;}
  .prog-bar{height:100%;border-radius:5px;transition:width .4s;}
  .rec-footer{display:flex;justify-content:space-between;align-items:center;}
  .saman-box{font-size:11px;color:#4b5563;margin-top:5px;background:#f9fafb;border-radius:6px;padding:4px 8px;line-height:1.5;}

  /* ── BUTTONS ── */
  .btn-primary{width:100%;background:linear-gradient(135deg,#92400e,#d97706);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;}
  .btn-green{width:100%;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;}
  .btn-add{background:#d97706;color:#fff;border:none;border-radius:10px;padding:7px 13px;font-weight:700;font-size:13px;cursor:pointer;}
  .btn-pay{background:#d97706;color:#fff;border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;}
  .btn-del{background:none;border:1px solid #ef4444;color:#ef4444;border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer;}
  .btn-tira{background:#16a34a;color:#fff;border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;}
  .btn-out{background:#dc2626;color:#fff;border:none;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;}
  .btn-small{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;color:#92400e;}
  .badge-paid{background:#dcfce7;color:#16a34a;border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;}
  .badge-warn{background:#fef3c7;color:#92400e;border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;}

  /* ── FAB ── */
  #fab{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:9px;z-index:30;}
  .fab-btn{width:48px;height:48px;border-radius:24px;color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .18s;box-shadow:0 6px 18px rgba(0,0,0,.25);}
  .fab-btn:hover{transform:scale(1.1);}

  /* ── MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease;}
  .modal-box{background:#fffbf5;border-radius:22px 22px 0 0;padding:20px 17px 50px;width:100%;max-width:430px;animation:slideUp .22s ease;max-height:92vh;overflow-y:auto;}
  .modal-header{font-weight:800;font-size:17px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
  .modal-close{background:none;border:none;color:#9ca3af;font-size:22px;cursor:pointer;line-height:1;}
  .form-field{margin-bottom:13px;}
  .form-field label{font-size:11px;font-weight:700;color:#6b7280;display:block;margin-bottom:4px;}
  .form-input{width:100%;padding:11px 13px;border:1.5px solid #fde68a;border-radius:10px;font-size:14px;background:#fff;outline:none;color:#1c1a17;}
  .form-input:focus{border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.15);}
  .cb-label{font-size:12px;font-weight:700;color:#6b7280;display:flex;align-items:center;gap:8px;cursor:pointer;}
  .pay-info{background:#fef9ec;border-radius:10px;padding:11px;margin-bottom:14px;border:1px solid #fde68a;}
  .pay-btns{display:flex;gap:7px;margin-bottom:14px;}

  /* ── DELETE CONFIRM ── */
  .del-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:center;justify-content:center;padding:0 16px;animation:fadeIn .14s ease;}
  .del-box{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:300px;text-align:center;animation:slideUp .18s ease;}
  .del-btns{display:flex;gap:9px;}
  .btn-cancel{flex:1;background:#f3f4f6;border:none;border-radius:10px;padding:11px;font-weight:700;cursor:pointer;font-size:13px;}
  .btn-delete{flex:1;background:#dc2626;color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700;cursor:pointer;font-size:13px;}

  /* ── TOAST ── */
  #toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.2);display:none;animation:toastPop .2s ease;}

  /* ── CONVERTER ── */
  .converter{margin-top:14px;background:#fff;border:1px solid #fde68a;border-radius:13px;padding:14px;}
  .conv-toggle{display:flex;gap:7px;margin-bottom:12px;}
  .conv-btn{flex:1;border:1px solid #fde68a;border-radius:8px;padding:7px 0;font-size:12px;font-weight:700;cursor:pointer;}
  .conv-result{padding:9px 13px;border-radius:9px;font-size:13px;font-weight:700;text-align:center;margin-top:9px;}

  /* ── SECTION HEADERS ── */
  .sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
  .sec-title{font-weight:800;font-size:15px;}
  .sec-sub{font-size:11px;color:#6b7280;}
  .empty-state{text-align:center;padding:36px 0;color:#9ca3af;}

  /* overdue section */
  .overdue-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:13px;padding:13px;margin-bottom:10px;}
  .overdue-title{font-weight:700;color:#c2410c;margin-bottom:7px;}
  .overdue-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid #fed7aa;}
  .baki-box{background:#fffbeb;border:1px solid #fde68a;border-radius:13px;padding:13px;}
  .baki-title{font-weight:700;color:#92400e;margin-bottom:7px;}
  .baki-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid #fde68a;}
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- HEADER -->
<div id="header">
  <div class="top">
    <div>
      <div class="label">मेरो खाता</div>
      <div class="title">Personal Khata</div>
      <div class="today" id="hdr-today"></div>
    </div>
    <div>
      <div class="baki-label">JAMMA BAKI</div>
      <div class="baki-val" id="hdr-baki"></div>
    </div>
  </div>
  <div class="pills">
    <div class="pill"><div class="pl">Rent Baki</div><div class="pv" id="pill-rent"></div></div>
    <div class="pill"><div class="pl">Pasal Baki</div><div class="pv" id="pill-pasal"></div></div>
    <div class="pill"><div class="pl">Overdue</div><div class="pv" id="pill-overdue"></div></div>
  </div>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('patro')" id="tb-patro"><span class="ti">📅</span><span class="tl">Patro</span></button>
  <button class="tab-btn" onclick="switchTab('summary')" id="tb-summary"><span class="ti">📊</span><span class="tl">Summary</span></button>
  <button class="tab-btn" onclick="switchTab('rent')" id="tb-rent"><span class="ti">🏠</span><span class="tl">Rent</span></button>
  <button class="tab-btn" onclick="switchTab('pasal')" id="tb-pasal"><span class="ti">🛒</span><span class="tl">Pasal</span></button>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- FAB -->
<div id="fab">
  <button class="fab-btn" style="background:#d97706" onclick="openModal('pasal')">🛒</button>
  <button class="fab-btn" style="background:#92400e" onclick="openModal('rent')">🏠</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- DELETE CONFIRM -->
<div id="del-overlay" class="del-overlay" style="display:none" onclick="if(event.target===this)closeDel()">
  <div class="del-box">
    <div style="font-size:34px;margin-bottom:5px">🗑️</div>
    <div style="font-weight:800;font-size:15px;margin-bottom:4px">Delete garne?</div>
    <div style="font-size:12px;color:#6b7280;margin-bottom:18px">Yo record permanently delete huncha.</div>
    <div class="del-btns">
      <button class="btn-cancel" onclick="closeDel()">Cancel</button>
      <button class="btn-delete" id="del-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  BS ENGINE
// ═══════════════════════════════════════════════════════
const BS_DATA = [
  [2000,30,32,31,32,31,30,30,30,29,30,29,31],[2001,31,31,32,31,31,31,30,29,30,29,30,30],
  [2002,31,31,32,32,31,30,30,29,30,29,30,30],[2003,31,32,31,32,31,30,30,30,29,29,30,31],
  [2004,30,32,31,32,31,30,30,30,29,30,29,31],[2005,31,31,32,31,31,31,30,29,30,29,30,30],
  [2006,31,31,32,32,31,30,30,29,30,29,30,30],[2007,31,32,31,32,31,30,30,30,29,29,30,31],
  [2008,31,31,31,32,31,31,29,30,30,29,29,31],[2009,31,31,32,31,31,31,30,29,30,29,30,30],
  [2010,31,31,32,32,31,30,30,29,30,29,30,30],[2011,31,32,31,32,31,30,30,30,29,29,30,31],

const BS_W    = ["आ","सो","मं","बु","बि","शु","श"];
const NP_D    = ["०","१","२","३","४","५","६","७","८","९"];
const nep     = n => String(n).split("").map(c=>NP_D[+c]??c).join("");
const bsDays  = (y,m) => { const r=BS_DATA.find(r=>r[0]===y); return r?r[m]:30; };

function adToBS(d){
  const dt=new Date(d);
  const base=new Date(1943,3,14);
  let days=Math.floor((dt-base)/86400000);
  if(days<0)return null;
  let y=2000,m=1,day=1;
  outer:for(let yi=2000;yi<2091;yi++){
    const r=BS_DATA.find(r=>r[0]===yi);
    if(!r)break;
    for(let mi=1;mi<=12;mi++){
      if(days<r[mi]){y=yi;m=mi;day=days+1;break outer;}
      days-=r[mi];
    }
  }
  return{y,m,d:day};
}
function bsToAD(y,m,d){
  let days=0;
  for(let yi=2000;yi<y;yi++){const r=BS_DATA.find(r=>r[0]===yi);if(r)for(let mi=1;mi<=12;mi++)days+=r[mi];}
  const r=BS_DATA.find(r=>r[0]===y);
  if(r)for(let mi=1;mi<m;mi++)days+=r[mi];
  days+=d-1;
  return new Date(new Date(1943,3,14).getTime()+days*86400000);
}
function bsToADStr(y,m,d){return bsToAD(y,m,d).toISOString().split("T")[0];}
function todayBS(){return adToBS(new Date());}
function fmtBS(adStr){
  if(!adStr)return"—";
  const bs=adToBS(new Date(adStr));
  return bs?`${nep(bs.d)} ${BS_M_NP[bs.m-1]} ${nep(bs.y)}`:"—";
}
function fmtAD(adStr){
  if(!adStr)return"—";
  const dt=new Date(adStr);
  const ms=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return`${dt.getDate()} ${ms[dt.getMonth()]} ${dt.getFullYear()}`;
}
const fmtNPR=n=>`Rs ${Number(n).toLocaleString()}`;
const todayStr=()=>new Date().toISOString().split("T")[0];

function totals(){
  const rentT=rents.reduce((s,r)=>s+Number(r.amount),0);
  const rentP=rents.filter(r=>r.paid).reduce((s,r)=>s+Number(r.amount),0);
  const pasalT=pasals.reduce((s,p)=>s+Number(p.total),0);
  const pasalP=pasals.reduce((s,p)=>s+Number(p.paid),0);
  const overdue=rents.filter(r=>!r.paid&&r.dueDate&&new Date(r.dueDate)<new Date());
  return{rentT,rentP,rentB:rentT-rentP,pasalT,pasalP,pasalB:pasalT-pasalP,overdue};
}

  const map={};

    const bs=adToBS(new Date(ds));
    if(!bs)return;
    const k=`${bs.y}-${bs.m}-${bs.d}`;
    if(!map[k])map[k]=[];
    map[k].push(ev);
  };
  rents.forEach(r=>{
    mark(r.dueDate, {type:"rent-due", label:`Rent Due: ${r.month}`, color:"#dc2626"});
    mark(r.paidDate,{type:"rent-paid",label:`Rent Paid: ${r.month}`,color:"#16a34a"});

  pasals.forEach(p=>mark(p.date,{type:"pasal",label:`${p.pasal}: ${fmtNPR(Number(p.total)-Number(p.paid))} baki`,color:Number(p.paid)>=Number(p.total)?"#16a34a":"#d97706"}));
  return map;
}

function renderPatro(){
  const evMap=eventMap();
  const mDays=bsDays(calY,calM);
  const first=bsToAD(calY,calM,1).getDay();
  const total=Math.ceil((first+mDays)/7)*7;
  const tbs=todayBS();

  // grid cells
  let cells="";
  for(let i=0;i<total;i++){
    const dn=i-first+1;
    const valid=dn>=1&&dn<=mDays;
    if(!valid){cells+=`<div class="cal-day empty"></div>`;continue;}
    const isTod=tbs&&calY===tbs.y&&calM===tbs.m&&dn===tbs.d;
    const isSel=dn===selDay;
    const dow=i%7;
    const adDay=bsToAD(calY,calM,dn);
    const evs=evMap[`${calY}-${calM}-${dn}`]||[];
    const hasDue=evs.some(e=>e.type==="rent-due");
    const hasPaid=evs.some(e=>e.type==="rent-paid");
    const hasPasal=evs.some(e=>e.type==="pasal");
    let cls="cal-day";
    if(isTod)cls+=" today";
    if(isSel)cls+=" selected";
    if(dow===6)cls+=" sat";
    if(dow===0)cls+=" sun";
    let dots="";
    if(hasDue||hasPaid||hasPasal){
      dots=`<div class="dots">`;
      if(hasDue)dots+=`<div class="dot" style="background:#dc2626"></div>`;
      if(hasPaid)dots+=`<div class="dot" style="background:#16a34a"></div>`;
      if(hasPasal)dots+=`<div class="dot" style="background:#d97706"></div>`;
      dots+=`</div>`;
    }
    cells+=`<div class="${cls}" onclick="pickDay(${dn})">

//  BS DATE PICKER CLASS
// ═══════════════════════════════════════════════════════
class BSPicker{
  constructor({id,label,value,accent,optional}){
    this.id=id; this.label=label; this.value=value||""; this.accent=accent||"#d97706"; this.optional=optional||false;
    const tbs=todayBS();
    const init=value?adToBS(new Date(value)):null;
    this.calY=init?.y||tbs?.y||2082;
    this.calM=init?.m||tbs?.m||1;
    this.open=false;
  }
  setVal(v){this.value=v;if(v){const bs=adToBS(new Date(v));if(bs){this.calY=bs.y;this.calM=bs.m;}}this.render();}
  prevM(){if(this.calM===1){this.calY--;this.calM=12;}else this.calM--;this.render();}
  nextM(){if(this.calM===12){this.calY++;this.calM=1;}else this.calM++;this.render();}
  toggleOpen(){this.open=!this.open;this.render();if(this.open){window._activePicker=this;}}
  pickDay(d){this.value=bsToADStr(this.calY,this.calM,d);this.open=false;this.render();}
  clear(){this.value="";this.render();}
  getHTML(){
    const selBS=this.value?adToBS(new Date(this.value)):null;
    const displayMain=selBS?`${nep(selBS.d)} ${BS_M_NP[selBS.m-1]} ${nep(selBS.y)}`:"मिति छान्नुहोस्…";
    const displayAD=this.value?`AD: ${fmtAD(this.value)}`:"";
    const tbs=todayBS();

    // calendar grid
    let calHtml="";
    if(this.open){
      const mDays=bsDays(this.calY,this.calM);
      const first=bsToAD(this.calY,this.calM,1).getDay();
      const total=Math.ceil((first+mDays)/7)*7;
      let cells="";
      for(let i=0;i<total;i++){
        const dn=i-first+1; const valid=dn>=1&&dn<=mDays;
        if(!valid){cells+=`<div class="bsdp-cell empty"></div>`;continue;}
        const isTod=tbs&&this.calY===tbs.y&&this.calM===tbs.m&&dn===tbs.d;
        const isSel=selBS&&this.calY===selBS.y&&this.calM===selBS.m&&dn===selBS.d;
        const dow=i%7;
        let cls="bsdp-cell";
        if(isTod)cls+=" tod";
        if(isSel)cls+=" sel";
        if(dow===6)cls+=" sat";
        if(dow===0)cls+=" sun";
        let st="";
        if(isSel)st=`background:${this.accent};color:#fff;`;
        else if(isTod)st=`background:${this.accent}20;color:${this.accent};border-color:${this.accent};`;
        // month/year dropdowns
        const mOpts=BS_M_NP.map((m,i)=>`<option value="${i+1}"${this.calM===i+1?" selected":""}>${m}</option>`).join("");
        const yOpts=Array.from({length:91},(_,i)=>2000+i).map(y=>`<option value="${y}"${this.calY===y?" selected":""}>${nep(y)}</option>`).join("");
        cells+=`<div class="${cls}" style="${st}" onclick="pickers['${this.id}'].pickDay(${dn})">${nep(dn)}</div>`;
        // reset for next iteration
        if(i===0){
          // generate the header once - we do it outside the loop below
        }
      }
      const mOpts=BS_M_NP.map((m,i)=>`<option value="${i+1}"${this.calM===i+1?" selected":""}>${m}</option>`).join("");
      const yOpts=Array.from({length:91},(_,i)=>2000+i).map(y=>`<option value="${y}"${this.calY===y?" selected":""}>${nep(y)}</option>`).join("");
      const dhHtml=BS_W.map((d,i)=>`<div class="bsdp-dhc" style="color:${i===6?"#dc2626":i===0?"#b45309":"#9ca3af"}">${d}</div>`).join("");
      const todBtn=`<button class="bsdp-today-btn" style="color:${this.accent}" onclick="pickers['${this.id}'].goToday()">↩ Aaja: ${tbs?`${nep(tbs.d)} ${BS_M_NP[tbs.m-1]} ${nep(tbs.y)}`:""}</button>`;
      calHtml=`<div class="bsdp-cal" style="--accent:${this.accent}">
        <div class="bsdp-nav">
          <button class="bsdp-nav-btn" style="color:${this.accent}" onclick="pickers['${this.id}'].prevM()">‹</button>
          <div>
            <select onchange="pickers['${this.id}'].calM=parseInt(this.value);pickers['${this.id}'].render()">${mOpts}</select>
            <select style="color:${this.accent}" onchange="pickers['${this.id}'].calY=parseInt(this.value);pickers['${this.id}'].render()">${yOpts}</select>
          </div>
          <button class="bsdp-nav-btn" style="color:${this.accent}" onclick="pickers['${this.id}'].nextM()">›</button>
        </div>
        ${todBtn}
        <div class="bsdp-dh">${dhHtml}</div>
        <div class="bsdp-grid">${cells}</div>
      </div>`;
    }

    const clearBtn=this.value&&this.optional?`<button class="dt-clear" onclick="event.stopPropagation();pickers['${this.id}'].clear()">✕</button>`:"";
    const optLabel=this.optional?` <span style="color:#9ca3af;font-weight:400">(optional)</span>`:"";

    return `<div class="bsdp" id="bsdp-wrap-${this.id}">
      <label>${this.label}${optLabel}</label>
      <div class="bsdp-trigger${this.open?" open":""}" onclick="pickers['${this.id}'].toggleOpen()">
        <div style="display:flex;align-items:center;gap:0">
          <span class="dt-icon">📅</span>
          <div>
            <div class="dt-main${selBS?"":" empty"}">${displayMain}</div>
            ${displayAD?`<div class="dt-sub">${displayAD}</div>`:""}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:5px">
          ${clearBtn}
          <span class="dt-arrow" style="color:${this.accent}">${this.open?"▲":"▼"}</span>
        </div>
      </div>
      ${calHtml}
    </div>`;
  }
  render(){
    const wrap=document.getElementById("bsdp-wrap-"+this.id);
    if(wrap){wrap.outerHTML=this.getHTML();}
  }
  goToday(){const tbs=todayBS();if(tbs){this.calY=tbs.y;this.calM=tbs.m;}this.render();}
}

window.pickers={};

function makePicker(cfg){
  const p=new BSPicker(cfg);
  window.pickers[cfg.id]=p;
  return p.getHTML();
}

// close pickers on outside click
document.addEventListener("click",e=>{
  Object.values(window.pickers).forEach(p=>{
    if(p.open){
      const wrap=document.getElementById("bsdp-wrap-"+p.id);
      if(wrap&&!wrap.contains(e.target)){p.open=false;p.render();}
    }
  });
});

function submitRent(){
  const month=document.getElementById("r-month")?.value.trim();
  const amt  =document.getElementById("r-amt")?.value;
  const due  =window.pickers["r-due"]?.value||"";
  const paid =window.pickers["r-paid"]?.value||"";
  const paidCb=document.getElementById("r-paid-cb")?.checked||false;
  const note =document.getElementById("r-note")?.value.trim()||"";
  if(!month||!amt||!due){showToast("Sabai field bharnu hos","err");return;}
  rents.unshift({id:Date.now(),month,amount:Number(amt),dueDate:due,paidDate:paid,paid:paidCb,note});
  saveData();closeModal();showToast("Rent record thapiyो ✓");renderContent();
}

function submitPasal(){
  const pasal=document.getElementById("p-pasal")?.value.trim();
  const items=document.getElementById("p-items")?.value.trim();
  const total=document.getElementById("p-total")?.value;
  const paid =document.getElementById("p-paid")?.value||"0";
  const date =window.pickers["p-date"]?.value||todayStr();
  const note =document.getElementById("p-note")?.value.trim()||"";
  if(!pasal||!items||!total){showToast("Sabai field bharnu hos","err");return;}
  pasals.unshift({id:Date.now(),pasal,items,total:Number(total),paid:Number(paid),date,note});
  saveData();closeModal();showToast("Pasal record thapiyो ✓");renderContent();
}

function submitPay(id,baki){

function markRentPaid(id){
  rents=rents.map(r=>r.id!==id?r:{...r,paid:true,paidDate:todayStr()});

// ═══════════════════════════════════════════════════════
let convMode="ad2bs";
function renderConverter(){
  const mOpts=BS_M_EN.map((m,i)=>`<option value="${i+1}">${m}</option>`).join("");
  return `<div class="converter">
    <div style="font-weight:700;font-size:13px;margin-bottom:11px;color:#92400e">🔄 BS ↔ AD Converter</div>
    <div class="conv-toggle">
      <button class="conv-btn" id="cb-ad2bs" style="background:${convMode==="ad2bs"?"#d97706":"#fef3c7"};color:${convMode==="ad2bs"?"#fff":"#92400e"}" onclick="convMode='ad2bs';renderContent()">AD → BS</button>
      <button class="conv-btn" id="cb-bs2ad" style="background:${convMode==="bs2ad"?"#d97706":"#fef3c7"};color:${convMode==="bs2ad"?"#fff":"#92400e"}" onclick="convMode='bs2ad';renderContent()">BS → AD</button>
    </div>
    ${convMode==="ad2bs"?
      `<div class="form-field"><input class="form-input" type="date" id="conv-ad" onchange="doConvert()"></div>`:
      `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:13px">
        <div><label style="font-size:9px;color:#9ca3af;font-weight:700;display:block;margin-bottom:3px">YEAR</label><input class="form-input" id="conv-y" type="number" placeholder="2082" style="padding:9px 7px;font-size:12px"></div>
        <div><label style="font-size:9px;color:#9ca3af;font-weight:700;display:block;margin-bottom:3px">MONTH</label><select class="form-input" id="conv-m" style="padding:9px 5px;font-size:11px">${mOpts}</select></div>
        <div><label style="font-size:9px;color:#9ca3af;font-weight:700;display:block;margin-bottom:3px">DAY</label><input class="form-input" id="conv-d" type="number" placeholder="1" min="1" max="32" style="padding:9px 7px;font-size:12px"></div>
      </div>`
    }
    <button onclick="doConvert()" style="width:100%;background:linear-gradient(135deg,#92400e,#d97706);color:#fff;border:none;border-radius:9px;padding:10px;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:8px">Convert Gara</button>
    <div id="conv-result"></div>
  </div>`;
}

function doConvert(){
  const res=document.getElementById("conv-result");if(!res)return;
  if(convMode==="ad2bs"){
    const v=document.getElementById("conv-ad")?.value;
    if(!v){res.innerHTML="";return;}
    const bs=adToBS(new Date(v));
    res.innerHTML=bs?`<div class="conv-result" style="background:#fef9ec;border:1px solid #fde68a;color:#92400e">📅 ${nep(bs.d)} ${BS_M_NP[bs.m-1]} ${nep(bs.y)} &nbsp; (${BS_M_EN[bs.m-1]} ${bs.d}, ${bs.y} BS)</div>`
      :`<div class="conv-result" style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626">Convert garna sakiyena.</div>`;
  }else{
    const y=parseInt(document.getElementById("conv-y")?.value);
    const m=parseInt(document.getElementById("conv-m")?.value);
    const d=parseInt(document.getElementById("conv-d")?.value);
    if(!y||!m||!d){res.innerHTML="";return;}
    const ad=bsToAD(y,m,d);
    res.innerHTML=`<div class="conv-result" style="background:#fef9ec;border:1px solid #fde68a;color:#92400e">📅 ${ad.toLocaleDateString("en-NP",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>`;
  }
}

//  INIT
// ═══════════════════════════════════════════════════════
renderContent();
</script>
